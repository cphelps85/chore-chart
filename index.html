<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Chore Chart</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    /* Light background + scattered confetti dots */
    body {
      background-color:#fffbf0;
      color:#1c1917;
      font-family:Georgia,serif;
      min-height:100vh;

      padding-top:env(safe-area-inset-top);
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;

        radial-gradient(circle, #f9a8d4 2px, transparent 2px),
        radial-gradient(circle, #c4b5fd 2px, transparent 2px),
        radial-gradient(circle, #93c5fd 2px, transparent 2px),
        radial-gradient(circle, #86efac 2px, transparent 2px),
        radial-gradient(circle, #fde68a 2px, transparent 2px),
        radial-gradient(circle, #fca5a5 2px, transparent 2px),

    #app { max-width:480px; margin:0 auto; position:relative; }

    /* Confetti burst animation */
    @keyframes confettiFall {
      0%   { transform:translateY(0) rotate(0deg);   opacity:1; }
      100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
    }
    .confetti-piece {
      position:fixed; border-radius:2px; pointer-events:none; z-index:9999;
      animation:confettiFall var(--dur, 2s) ease-in var(--delay, 0s) forwards;
    }

    /* Header */
    .header { padding:18px 20px 12px; border-bottom:2px solid #f3f4f6; display:flex; justify-content:space-between; align-items:center; background:#fff; }
    .header-title { font-size:20px; font-weight:700; letter-spacing:-0.5px; color:#1c1917; }
    .header-sub { font-size:12px; color:#9ca3af; margin-top:2px; }
    .header-right { display:flex; align-items:center; gap:10px; }

    /* Nav */
    .nav { display:flex; border-bottom:2px solid #f3f4f6; background:#fff; }
    .nav-btn { flex:1; padding:11px 0; background:none; border:none; color:#9ca3af; border-bottom:2px solid transparent; cursor:pointer; font-size:12px; font-family:Georgia,serif; transition:color 0.15s; }
    .nav-btn.active { color:#1c1917; border-bottom-color:#1c1917; }

    /* Views */
    .view { display:none; padding:16px; }
    .view.active { display:block; }

    /* Section headers */
    .sh { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#9ca3af; margin:20px 0 10px; padding-left:2px; }
    .sh:first-child { margin-top:4px; }

    /* Kid select screen */
    .kid-select { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; gap:14px; }
    .kid-btn { width:100%; max-width:340px; padding:24px 20px; border-radius:20px; border:2px solid; cursor:pointer; font-family:Georgia,serif; display:flex; align-items:center; gap:18px; transition:transform 0.1s; box-shadow:0 4px 16px rgba(0,0,0,0.08); }
    .kid-btn:active { transform:scale(0.97); }
    .kid-btn .k-emoji { font-size:52px; line-height:1; flex-shrink:0; }
    .kid-btn .k-name { font-size:28px; font-weight:700; }
    .kid-btn .k-status { font-size:13px; margin-top:4px; opacity:0.8; }
    .kid-btn.freddy { background:#fdf2f8; border-color:#f9a8d4; color:#be185d; }
    .kid-btn.claire { background:#faf5ff; border-color:#d8b4fe; color:#7c3aed; }
    .parent-link { font-size:13px; color:#9ca3af; background:none; border:none; cursor:pointer; font-family:Georgia,serif; text-decoration:underline; margin-top:8px; }

    /* Chore cards */
    .chore-card { background:#fff; border:2px solid #f3f4f6; border-radius:16px; padding:16px 18px; margin-bottom:10px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all 0.15s; box-shadow:0 2px 8px rgba(0,0,0,0.05); -webkit-user-select:none; user-select:none; }
    .chore-card:active { transform:scale(0.98); }
    .chore-card.done { background:#f0fdf4; border-color:#bbf7d0; }
    .chore-emoji { font-size:32px; flex-shrink:0; }
    .chore-info { flex:1; min-width:0; }
    .chore-name { font-size:16px; font-weight:600; color:#1c1917; }
    .chore-name.done-text { text-decoration:line-through; color:#9ca3af; }
    .chore-desc { font-size:12px; color:#6b7280; margin-top:3px; line-height:1.4; }
    .chore-check { width:36px; height:36px; border-radius:50%; border:2px solid #e5e7eb; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; flex-shrink:0; color:#16a34a; transition:all 0.15s; }
    .chore-card.done .chore-check { background:#14532d; border-color:#4ade80; }

    /* Progress banners */
    .prog-banner { border-radius:14px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:center; gap:14px; }
    .prog-banner.great { background:linear-gradient(135deg,#dcfce7,#bbf7d0); border:2px solid #86efac; }
    .prog-banner.going { background:linear-gradient(135deg,#fef3c7,#fde68a); border:2px solid #fbbf24; }
    .prog-banner.start { background:#f9fafb; border:2px solid #f3f4f6; }

    /* Week view */
    .week-day-block { margin-bottom:18px; }

    .wdl-count { margin-left:auto; font-size:13px; color:#9ca3af; }

    /* Compact chore row */
    .chore-row { background:#fff; border:2px solid #f3f4f6; border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.15s; box-shadow:0 1px 4px rgba(0,0,0,0.04); }

    .chore-row.done { background:#f0fdf4; border-color:#bbf7d0; }

    .cr-name { flex:1; font-size:14px; font-weight:600; color:#1c1917; }
    .cr-name.done-text { text-decoration:line-through; color:#9ca3af; }
    .cr-check { font-size:16px; }
    .cr-who { font-size:11px; font-weight:700; padding:3px 8px; border-radius:99px; flex-shrink:0; }
    .cr-who.freddy { background:#fdf2f8; color:#be185d; }
    .cr-who.claire { background:#faf5ff; color:#7c3aed; }

    /* History */
    .hist-card { background:#fff; border:2px solid #f3f4f6; border-radius:12px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .hist-week-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .hist-wk-dates { font-size:13px; font-weight:700; color:#1c1917; }
    .cur-week-tag { font-size:10px; background:#f3f4f6; color:#6b7280; padding:2px 8px; border-radius:99px; }
    .hist-kid-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .hkr-emoji { font-size:22px; width:30px; line-height:1; }
    .hkr-bar { flex:1; height:10px; background:#f3f4f6; border-radius:99px; overflow:hidden; }
    .hkr-fill { height:100%; border-radius:99px; }
    .hkr-pct { font-size:12px; font-weight:700; min-width:36px; text-align:right; }

    /* Settings */
    .s-card { background:#fff; border:2px solid #f3f4f6; border-radius:12px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .s-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f3f4f6; }
    .s-row:last-child { border-bottom:none; }
    .s-label { font-size:13px; font-weight:600; color:#1c1917; }
    .s-sub { font-size:11px; color:#9ca3af; margin-top:2px; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:99px; font-size:12px; font-weight:700; }
    .badge.freddy { background:#fdf2f8; color:#be185d; }
    .badge.claire { background:#faf5ff; color:#7c3aed; }
    .day-picker { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
    .dp-btn { padding:5px 10px; border-radius:99px; border:1px solid #e5e7eb; background:#f3f4f6; color:#6b7280; font-size:11px; cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; }
    .dp-btn.on { background:#fdf4ff; border-color:#d8b4fe; color:#7c3aed; }
    .icon-btn { padding:7px 14px; border-radius:10px; border:1px solid #e5e7eb; background:#f3f4f6; color:#6b7280; font-size:12px; cursor:pointer; font-family:Georgia,serif; }

    /* Overview cards (parent) */
    .ov-card { background:#fff; border:2px solid #f3f4f6; border-radius:14px; padding:16px 18px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .ov-bar { height:10px; background:#f3f4f6; border-radius:99px; overflow:hidden; margin-top:8px; }
    .ov-fill { height:100%; border-radius:99px; }

    /* Misc */
    .empty { text-align:center; color:#9ca3af; padding:48px 16px; font-size:14px; line-height:2; }
    .change-kid { padding:6px 14px; border-radius:10px; border:1px solid #e5e7eb; background:#f3f4f6; color:#6b7280; font-size:12px; cursor:pointer; font-family:Georgia,serif; }
    .pill { padding:8px 18px; border-radius:10px; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:Georgia,serif; }
  </style>
</head>

<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af;gap:16px">
    <div style="font-size:40px">⭐</div><div style="font-size:14px">Loading…</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config (reusing daily-scorecard project) ─────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyAu5PZP0rRuTsWlk-5zF0GOAMbUGjYBYQ0",
  authDomain:        "daily-scorecard-62031.firebaseapp.com",
  projectId:         "daily-scorecard-62031",
  storageBucket:     "daily-scorecard-62031.firebasestorage.app",
  messagingSenderId: "647221313494",
  appId:             "1:647221313494:web:f4755a965e75b044a46e77"
};

const IS_DEV    = window.location.protocol === 'file:';
const DB_PREFIX = IS_DEV ? 'dev_' : '';

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

if (IS_DEV) {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#e65c00;color:#fff;text-align:center;font-weight:700;font-size:0.85rem;padding:0.4rem 1rem';
  b.textContent = '⚠️ DEV MODE — test data only';
  document.body.prepend(b);
}

// ── Constants ─────────────────────────────────────────────────────────
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Claire's icon is an inline SVG (Chase from Paw Patrol — German Shepherd police pup).
// width/height="1em" means it scales with whatever font-size surrounds it, just like an emoji.
const CHASE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="1em" height="1em" style="vertical-align:-0.15em;display:inline-block">
  <!-- blue police hat brim -->
  <ellipse cx="32" cy="26" rx="25" ry="5.5" fill="#1d4ed8"/>
  <!-- hat body -->
  <rect x="13" y="9" width="38" height="19" rx="6" fill="#3b82f6"/>
  <!-- hat highlight -->
  <rect x="16" y="11" width="32" height="5" rx="3" fill="#60a5fa" opacity="0.4"/>
  <!-- gold star badge -->
  <polygon points="32,13 33.6,17.4 38.2,17.4 34.6,20.1 35.9,24.5 32,21.9 28.1,24.5 29.4,20.1 25.8,17.4 30.4,17.4" fill="#fbbf24"/>
  <!-- dark ear base (behind head) -->
  <polygon points="16,38 10,12 24,31" fill="#92400e"/>
  <polygon points="48,38 54,12 40,31" fill="#92400e"/>
  <!-- inner ear -->
  <polygon points="17,35 13,17 22,29" fill="#fda4af" opacity="0.45"/>
  <polygon points="47,35 51,17 42,29" fill="#fda4af" opacity="0.45"/>
  <!-- head (tan German Shepherd) -->
  <circle cx="32" cy="44" r="17" fill="#d97706"/>
  <!-- dark saddle marking on top of head -->
  <ellipse cx="32" cy="34" rx="11" ry="8" fill="#92400e" opacity="0.75"/>
  <!-- lighter muzzle -->
  <ellipse cx="32" cy="50" rx="10" ry="9" fill="#fde68a"/>
  <!-- eyes -->
  <circle cx="26" cy="41" r="4" fill="#1c1917"/>
  <circle cx="38" cy="41" r="4" fill="#1c1917"/>
  <!-- eye shine -->
  <circle cx="27.2" cy="39.8" r="1.4" fill="white"/>
  <circle cx="39.2" cy="39.8" r="1.4" fill="white"/>
  <!-- nose -->
  <ellipse cx="32" cy="47" rx="4.5" ry="3.5" fill="#1c1917"/>
  <!-- nostrils -->
  <circle cx="30.2" cy="47.8" r="1.1" fill="#431407"/>
  <circle cx="33.8" cy="47.8" r="1.1" fill="#431407"/>
  <!-- smile -->
  <path d="M 26 52 Q 32 58 38 52" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tongue -->
  <ellipse cx="32" cy="55.5" rx="3.5" ry="3" fill="#f87171"/>
</svg>`;

const KIDS = {
  freddy: { name:'Freddy', emoji:'🦊',      color:'#ec4899', btnCls:'freddy' },
  claire: { name:'Claire', emoji:CHASE_SVG, color:'#a855f7', btnCls:'claire' },
};

// who:
//   'claire'/'freddy'  → that kid only
//   'each'             → both kids independently
//   'shared'           → one kid per week, rotates
//   'split'            → two days/week, one kid each day
//
// schedule:
//   'daily'            → every day
//   'school-day'       → Mon–Fri
//   'school-night'     → Sun–Thu (night before school)
//   'weekend'          → Sat or Sun; once done either day, counts for the weekend
//   'weekly'           → specific dow(s) in settings.choreDays[id]

const CHORES = [
  { id:'feed-dogs',    name:'Feed the Dogs',      emoji:'🐕', who:'split',  schedule:'split',       desc:'Fill dog bowls with food & fresh water' },
  { id:'feed-birds',   name:'Feed the Birds',      emoji:'🐦', who:'split',  schedule:'split',       desc:'Fill the bird feeder' },
  { id:'towels',       name:'Change Hand Towels',  emoji:'🚿', who:'shared', schedule:'weekly',      desc:'Replace hand towels in the bathrooms' },
  { id:'toilet-paper', name:'Check Toilet Paper',  emoji:'🧻', who:'shared', schedule:'weekly',      desc:'Check & refill toilet paper if needed' },
  { id:'new-room',     name:'Clean New Room',      emoji:'🧹', who:'shared', schedule:'weekly',      desc:'Tidy and clean the new room' },
  { id:'bedroom',      name:'Clean Bedroom',       emoji:'🛏️', who:'each',   schedule:'weekly',      desc:'Make bed, pick up toys, tidy your room' },
  { id:'laundry',      name:'Do Laundry',          emoji:'👕', who:'each',   schedule:'weekend',     desc:'Wash, dry, and put away clothes' },
  { id:'pack-snack',   name:'Pack School Snack',   emoji:'🍎', who:'each',   schedule:'school-night',desc:'Put a snack in your backpack for tomorrow' },
  { id:'backpack',     name:'Unpack Backpack',      emoji:'🎒', who:'each',   schedule:'school-day',  desc:'Unpack and put everything away' },
];

// ── Default settings ──────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  birdDays:  [2, 5],      // Tue + Fri
  choreDays: {
    towels:        [6],   // Saturday
    'toilet-paper':[6],
    'new-room':    [6],
    bedroom:       [0],   // Sunday
  },
};

// ── State ─────────────────────────────────────────────────────────────
let user        = null;
let activeKid   = sessionStorage.getItem('cc_kid') || null;
let currentView = 'today';
let settings    = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
let weeklyPlans = {};   // { weekStart: planObj }
let choreLog    = {};   // { dateStr: { 'freddy-backpack': {done,ts}, ... } }

// ── Firestore helpers ─────────────────────────────────────────────────
// Nest under existing users/{uid} path so existing Firestore rules apply.
// Subcollections are prefixed with chore_ to avoid clashing with the scorecard.
const uDoc = (...p) => doc(db, DB_PREFIX + 'users', user.uid, ...p);
const uCol = n      => collection(db, DB_PREFIX + 'users', user.uid, n);

// ── Date helpers ──────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const dStr     = d  => d.toISOString().slice(0,10);

function weekStart(ds) {
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() - d.getDay());
  return dStr(d);
}

function weekDays(ws) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(ws + 'T12:00:00');
    d.setDate(d.getDate() + i);
    return dStr(d);
  });
}

function prevWeekStart(ws) {
  const d = new Date(ws + 'T12:00:00');
  d.setDate(d.getDate() - 7);
  return dStr(d);
}

function saturdayOf(ds) {
  const d = new Date(ds + 'T12:00:00');
  const dow = d.getDay();
  if (dow === 6) return ds;
  if (dow === 0) { d.setDate(d.getDate() - 1); return dStr(d); }
  return null;
}

// ── Weekly plan generation ────────────────────────────────────────────
function generatePlan(ws) {
  const plan = {};
  const weekNum = Math.floor(new Date(ws + 'T12:00:00').getTime() / (7 * 86400000));

  // Bird feeding: two days, one kid each (randomly assigned)
  const birdDays = settings.birdDays.slice().sort((a,b)=>a-b);
  const firstKid = Math.random() < 0.5 ? 'freddy' : 'claire';
  plan['feed-birds'] = [
    { day: birdDays[0], kid: firstKid },
    { day: birdDays[1], kid: firstKid === 'freddy' ? 'claire' : 'freddy' },
  ];

  // Dog feeding: all 7 days split ~4/3; who gets the extra day alternates weekly
  const firstDogKid = weekNum % 2 === 0 ? 'freddy' : 'claire';
  const secondDogKid = firstDogKid === 'freddy' ? 'claire' : 'freddy';
  plan['feed-dogs'] = [0,1,2,3,4,5,6].map(day => ({
    day,
    kid: day % 2 === 0 ? firstDogKid : secondDogKid,
  }));

  // Shared chores: deterministic alternation so it's always fair
  CHORES.filter(c => c.who === 'shared').forEach((chore, i) => {
    const kid = (weekNum + i) % 2 === 0 ? 'freddy' : 'claire';
    const days = (settings.choreDays[chore.id] || [6]).slice();
    plan[chore.id] = { kid, days };
  });

  return plan;
}

async function ensurePlan(ws) {
  if (weeklyPlans[ws]) return;
  const snap = await getDoc(uDoc('chore_plans', ws));
  if (!snap.exists()) {
    weeklyPlans[ws] = generatePlan(ws);
    await setDoc(uDoc('chore_plans', ws), weeklyPlans[ws]);
    return;
  }
  const plan = snap.data();
  // Upgrade existing plans: fill in any split/shared chores added since the plan was saved
  const fresh = generatePlan(ws);
  let dirty = false;
  CHORES.filter(c => c.who === 'split' || c.who === 'shared').forEach(c => {
    if (!plan[c.id]) { plan[c.id] = fresh[c.id]; dirty = true; }
  });
  if (dirty) await setDoc(uDoc('chore_plans', ws), plan);
  weeklyPlans[ws] = plan;
}

// ── Load / Save ───────────────────────────────────────────────────────
async function loadAll() {
  // Settings
  const ss = await getDoc(uDoc('chore_settings','prefs'));
  if (ss.exists()) {
    const d = ss.data();
    settings.birdDays  = d.birdDays  || DEFAULT_SETTINGS.birdDays;
    settings.choreDays = { ...DEFAULT_SETTINGS.choreDays, ...(d.choreDays || {}) };
  }

  // Weekly plans: current + 3 prior weeks
  const ws  = weekStart(todayStr());
  const wss = [ws, prevWeekStart(ws), prevWeekStart(prevWeekStart(ws)),
               prevWeekStart(prevWeekStart(prevWeekStart(ws)))];
  await Promise.all(wss.map(ensurePlan));

  // Chore logs for all those days
  const allDays = wss.flatMap(weekDays);
  choreLog = {};
  await Promise.all(allDays.map(async ds => {
    const snap = await getDoc(uDoc('chore_log', ds));
    if (snap.exists()) choreLog[ds] = snap.data();
  }));
}

async function saveLog(ds) {
  await setDoc(uDoc('chore_log', ds), choreLog[ds] || {});
}
async function saveSettings() { await setDoc(uDoc('chore_settings','prefs'), settings); }
async function savePlan(ws)   { await setDoc(uDoc('chore_plans', ws), weeklyPlans[ws]); }

// ── Chore logic ───────────────────────────────────────────────────────
function getChoresForKid(kidId, ds) {
  const d   = new Date(ds + 'T12:00:00');
  const dow  = d.getDay();
  const ws   = weekStart(ds);
  const plan = weeklyPlans[ws] || {};
  const result = [];

  for (const chore of CHORES) {
    // --- Is this kid doing this chore? ---
    let assigned = false;
    if (chore.who === kidId)      assigned = true;
    else if (chore.who === 'each') assigned = true;
    else if (chore.who === 'shared') {
      const e = plan[chore.id];
      if (e) {
        assigned = e.kid === kidId;
      } else {
        // Plan entry missing (stale Firestore snapshot). Use same deterministic
        // formula as generatePlan() so a missing entry never silently drops chores.
        const weekNum = Math.floor(new Date(ws + 'T12:00:00').getTime() / (7 * 86400000));
        const sharedChores = CHORES.filter(c => c.who === 'shared');
        const idx = sharedChores.indexOf(chore);
        assigned = ((weekNum + idx) % 2 === 0) ? kidId === 'freddy' : kidId === 'claire';
      }
    }
    else if (chore.who === 'split') {
      const entries = plan[chore.id] || [];
      assigned = entries.some(e => e.kid === kidId && e.day === dow);
    }
    if (!assigned) continue;

    // --- Is it scheduled today? ---
    let scheduled = false;
    const isSchoolDay   = dow >= 1 && dow <= 5;
    const isSchoolNight = dow <= 4;
    const isWeekend     = dow === 0 || dow === 6;

    switch (chore.schedule) {
      case 'daily':        scheduled = true; break;
      case 'school-day':   scheduled = isSchoolDay; break;
      case 'school-night': scheduled = isSchoolNight; break;
      case 'weekend':      scheduled = isWeekend; break;
      case 'split':        scheduled = true; break; // already checked day in assigned
      case 'weekly': {
        const days = plan[chore.id]?.days || settings.choreDays[chore.id] || [6];
        scheduled = days.includes(dow);
        break;
      }
    }
    if (!scheduled) continue;

    // --- Check if done ---
    const key = `${kidId}-${chore.id}`;

    // For weekend laundry: check both Sat and following Sun
    if (chore.schedule === 'weekend') {
      const sat = saturdayOf(ds);
      if (sat) {
        const satDone  = !!choreLog[sat]?.[key]?.done;
        const sunDs    = (() => { const d2=new Date(sat+'T12:00:00'); d2.setDate(d2.getDate()+1); return dStr(d2); })();
        const sunDone  = !!choreLog[sunDs]?.[key]?.done;
        result.push({ ...chore, key, done: satDone || sunDone });
        continue;
      }
    }

    result.push({ ...chore, key, done: !!choreLog[ds]?.[key]?.done });
  }

  return result;
}

async function toggleChore(kidId, key, ds) {
  if (!choreLog[ds]) choreLog[ds] = {};
  const cur = choreLog[ds][key]?.done || false;
  choreLog[ds][key] = { done: !cur, ts: Date.now(), kid: kidId };
  await saveLog(ds);
}

// ── TODAY ─────────────────────────────────────────────────────────────
function renderToday() {
  const el = freshView('today');
  const ds = todayStr();

  if (activeKid === 'parent') { renderParentToday(el, ds); return; }

  const kidId  = activeKid;
  const chores = getChoresForKid(kidId, ds);

  if (chores.length === 0) {

  if (allDone)  launchConfetti();

  let html = '';

  if (allDone) {
    html += `<div class="prog-banner great">
      <div style="font-size:44px">🌟</div>

        <div style="font-size:16px;font-weight:700;color:#4ade80">All done — amazing job!</div>

        <div style="font-size:15px;font-weight:700;color:#fbbf24">Keep going!</div>

        <div style="font-size:15px;font-weight:700">Let's get started!</div>

let confettiLaunched = false;
function launchConfetti() {
  if (confettiLaunched) return;
  confettiLaunched = true;
  const colors = ['#f472b6','#c084fc','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    const size = 6 + Math.random() * 8;
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw; top:-12px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.4?'50%':'3px'};
      --dur:${1.4+Math.random()*1.4}s;
      --delay:${Math.random()*0.6}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// ── HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  const el  = freshView('history');
  const ws  = weekStart(todayStr());
  let html  = `<div class="sh">Completion History</div>`;

  const weekStarts = [ws];
  for (let i=1; i<4; i++) {
    let w = ws;
    for (let j=0; j<i; j++) w = prevWeekStart(w);
    weekStarts.push(w);
  }

  weekStarts.forEach(w => {
    const days = weekDays(w);
    const startFmt = new Date(w+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const endFmt   = new Date(days[6]+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const isCur    = w === ws;

    // Tally unique chores per kid (dedup weekend laundry)
    function tally(kidId) {
      let done=0, total=0;
      const seenWeekendLaundry = new Set();
      days.forEach(ds => {
        getChoresForKid(kidId, ds).forEach(c => {
          if (c.schedule === 'weekend') {
            const wk = weekStart(ds);
            if (seenWeekendLaundry.has(wk+c.id)) return;
            seenWeekendLaundry.add(wk+c.id);
          }
          total++;
          if (c.done) done++;
        });
      });
      return { done, total, pct: total>0?done/total:0 };
    }

    const f = tally('freddy'), c = tally('claire');

    html += `<div class="hist-card">
      <div class="hist-week-hdr">
        <div class="hist-wk-dates">${startFmt} – ${endFmt}</div>
        ${isCur?'<div class="cur-week-tag">This week</div>':''}
      </div>
      <div class="hist-kid-row">
        <div class="hkr-emoji">${KIDS.freddy.emoji}</div>
        <div class="hkr-bar"><div class="hkr-fill" style="width:${Math.round(f.pct*100)}%;background:${KIDS.freddy.color}"></div></div>
        <div class="hkr-pct" style="color:${KIDS.freddy.color}">${f.done}/${f.total}</div>
      </div>
      <div class="hist-kid-row">
        <div class="hkr-emoji">${KIDS.claire.emoji}</div>
        <div class="hkr-bar"><div class="hkr-fill" style="width:${Math.round(c.pct*100)}%;background:${KIDS.claire.color}"></div></div>
        <div class="hkr-pct" style="color:${KIDS.claire.color}">${c.done}/${c.total}</div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

    </div>`;
  });
  html += `</div>`;

  // ── Swap / reassign ──
  html += `<div class="sh">Swap This Week</div>`;
  html += `<div class="s-card">
    <div style="font-size:12px;color:#71717a;margin-bottom:10px">Tap to swap who does a shared chore this week.</div>`;

  CHORES.filter(c => c.who === 'shared').forEach(c => {
    const e = plan[c.id];
    if (!e) return;
    const other = e.kid === 'freddy' ? 'claire' : 'freddy';
    html += `<div class="s-row">
      <div class="s-label">${c.emoji} ${c.name}</div>
      <button class="icon-btn" data-action="swap-shared" data-id="${c.id}">
        ${KIDS[e.kid].emoji}→${KIDS[other].emoji} Swap
      </button>
    </div>`;
  });
  html += `<div class="s-row">
    <div class="s-label">🐕 Dog feeding days</div>
    <button class="icon-btn" data-action="swap-dogs">🔄 Swap kids</button>
  </div>`;
  html += `<div class="s-row">
    <div class="s-label">🐦 Bird feeding days</div>
    <button class="icon-btn" data-action="swap-birds">🔄 Swap kids</button>
  </div>`;
  html += `</div>`;
  html += `<button data-action="regenerate" style="width:100%;padding:11px;border-radius:10px;border:1px solid #3f3f46;background:transparent;color:#71717a;font-size:12px;font-weight:700;cursor:pointer;font-family:Georgia,serif;margin-bottom:4px;">🔀 Regenerate All Assignments for This Week</button>`;

  // ── Default schedule ──
  html += `<div class="sh">Default Schedule</div>`;
  html += `<div class="s-card">
    <div style="font-size:12px;color:#71717a;margin-bottom:12px;line-height:1.6">Set which day(s) each weekly chore falls on. Changes apply to new weeks going forward.</div>`;

  CHORES.filter(c => c.schedule === 'weekly').forEach(c => {
    const cur = (settings.choreDays[c.id] || [6]).slice();
    html += `<div style="padding:10px 0;border-bottom:1px solid #27272a">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">${c.emoji} ${c.name}</div>
      <div class="day-picker">${DAY_SHORT.map((n,i)=>`<button class="dp-btn ${cur.includes(i)?'on':''}" data-action="toggle-day" data-cid="${c.id}" data-dow="${i}">${n}</button>`).join('')}</div>
    </div>`;
  });

  const birdDays = settings.birdDays.slice();
  html += `<div style="padding:10px 0">
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">🐦 Bird Feeding Days <span style="font-size:11px;color:#52525b;font-weight:400">(pick exactly 2)</span></div>
    <div class="day-picker">${DAY_SHORT.map((n,i)=>`<button class="dp-btn ${birdDays.includes(i)?'on':''}" data-action="toggle-bird" data-dow="${i}">${n}</button>`).join('')}</div>
  </div>`;
  html += `</div>`;

  // ── Account ──
  html += `<div class="sh">Account</div>`;
  html += `<div class="s-card"><div class="s-row">
    <div><div class="s-label">${user?.displayName || 'Parent'}</div><div class="s-sub">Signed in with Google</div></div>
    <button data-action="signout" class="icon-btn">Sign out</button>
  </div></div>`;

  el.innerHTML = html;

  el.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'swap-shared') {
      const id = btn.dataset.id;
      if (weeklyPlans[ws][id]) {
        weeklyPlans[ws][id].kid = weeklyPlans[ws][id].kid === 'freddy' ? 'claire' : 'freddy';
        await savePlan(ws);
        renderSettings();
      }
    }
    else if (action === 'swap-dogs') {
      (weeklyPlans[ws]['feed-dogs'] || []).forEach(e => {
        e.kid = e.kid === 'freddy' ? 'claire' : 'freddy';
      });
      await savePlan(ws);
      renderSettings();
    }
    else if (action === 'swap-birds') {
      (weeklyPlans[ws]['feed-birds'] || []).forEach(e => {
        e.kid = e.kid === 'freddy' ? 'claire' : 'freddy';
      });
      await savePlan(ws);
      renderSettings();
    }
    else if (action === 'regenerate') {
      if (confirm('Regenerate this week\'s assignments with new random picks?')) {
        weeklyPlans[ws] = generatePlan(ws);
        await savePlan(ws);
        renderSettings();
      }
    }
    else if (action === 'toggle-day') {
      const cid = btn.dataset.cid;
      const dow = parseInt(btn.dataset.dow);
      let days = (settings.choreDays[cid] || [6]).slice();
      const idx = days.indexOf(dow);
      if (idx >= 0) { if (days.length > 1) days.splice(idx, 1); }
      else days.push(dow);
      days.sort((a,b)=>a-b);
      settings.choreDays[cid] = days;
      await saveSettings();
      renderSettings();
    }
    else if (action === 'toggle-bird') {
      const dow = parseInt(btn.dataset.dow);
      let days = settings.birdDays.slice();
      const idx = days.indexOf(dow);
      if (idx >= 0) {
        if (days.length > 1) days.splice(idx, 1);
      } else {
        if (days.length >= 2) { alert('Bird feeding needs exactly 2 days. Deselect one first.'); return; }
        days.push(dow);
      }
      days.sort((a,b)=>a-b);
      settings.birdDays = days;
      await saveSettings();
      renderSettings();
    }
    else if (action === 'signout') {
      if (confirm('Sign out?')) signOut(auth);
    }
  });
}
</script>
</body>
</html>
